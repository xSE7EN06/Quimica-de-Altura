<ion-header class="ion-no-border">
    <ion-toolbar>
        <ion-buttons slot="end">
            <ion-button (click)="dismiss()">
                <ion-icon name="close-outline" slot="icon-only"></ion-icon>
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
    <div class="modal-wrapper">

        <!-- Step 1: Request Email -->
        <div *ngIf="step === 'request'" class="fade-in">
            <div class="icon-container">
                <ion-icon name="lock-closed"></ion-icon>
            </div>
            <div class="header-text">
                <h2>Recuperar Contraseña</h2>
                <p>Ingresa tu correo electrónico</p>
            </div>

            <form [formGroup]="requestForm" (ngSubmit)="onRequestSubmit()">
                <div class="input-group">
                    <ion-item lines="none" class="custom-input">
                        <ion-icon slot="start" name="mail" color="primary"></ion-icon>
                        <ion-input formControlName="email" type="email" placeholder="Correo electrónico"></ion-input>
                    </ion-item>
                </div>

                <ion-button type="submit" expand="block" shape="round" color="primary" class="submit-btn" mode="ios"
                    [disabled]="isLoading || requestForm.invalid">
                    <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
                    <span *ngIf="!isLoading">Enviar Código</span>
                </ion-button>
            </form>
        </div>

        <!-- Step 2: Reset Password -->
        <div *ngIf="step === 'reset'" class="fade-in">
            <div class="header-text">
                <h2>Restablecer Contraseña</h2>
                <p>Puedes cambiar tu contraseña.</p>
            </div>

            <form [formGroup]="resetForm" (ngSubmit)="onResetSubmit()">

                <div class="input-group">
                    <ion-item lines="none" class="custom-input">
                        <ion-icon slot="start" name="key-outline" color="primary"></ion-icon>
                        <ion-input formControlName="code" type="text" placeholder="Código de 6 dígitos" maxlength="6"
                            class="code-input"></ion-input>
                    </ion-item>

                    <ion-item lines="none" class="custom-input">
                        <ion-icon slot="start" name="lock-closed" color="primary"></ion-icon>
                        <ion-input formControlName="new_password" [type]="showPassword ? 'text' : 'password'"
                            placeholder="Nueva contraseña"></ion-input>
                        <ion-icon slot="end" [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" color="medium"
                            (click)="togglePassword()"></ion-icon>
                    </ion-item>

                    <ion-item lines="none" class="custom-input">
                        <ion-icon slot="start" name="lock-closed" color="primary"></ion-icon>
                        <ion-input formControlName="confirm_password" [type]="showPassword ? 'text' : 'password'"
                            placeholder="Confirmar contraseña"></ion-input>
                    </ion-item>
                </div>

                <div class="resend-container">
                    <span (click)="resendCode()" [class.disabled]="isLoading">¿No recibiste el código? Reenviar</span>
                </div>

                <ion-button type="submit" expand="block" shape="round" color="primary" class="submit-btn" mode="ios"
                    [disabled]="isLoading || resetForm.invalid">
                    <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
                    <span *ngIf="!isLoading">Restaurar Contraseña</span>
                </ion-button>
            </form>
        </div>

    </div>
</ion-content>
