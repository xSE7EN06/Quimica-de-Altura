<div class="drug-references-page">
  <header class="page-header">
    <div class="page-title">
      <h1>Referencias Farmacológicas</h1>
      <p>Gestiona los análogos farmacológicos y sus plantas medicinales relacionadas</p>
    </div>
  </header>

  <app-data-table [data]="items" [columns]="columns" [loading]="tableLoading"
    (rowClick)="onViewItem($event)" (editAction)="onEditItem($event)"
    (deleteAction)="onBulkDelete($event)" (resetFilters)="onResetFilters()">

    <div search-bar class="search-bar">
      <mat-icon class="search-icon">search</mat-icon>
      <input type="text" [(ngModel)]="searchTerm" placeholder="Buscar fármaco o compuesto..." />
      <mat-icon class="clear-icon" *ngIf="searchTerm" (click)="searchTerm = ''">close</mat-icon>
    </div>

    <button add-button class="btn-primary" (click)="onAddItem()">
      <mat-icon>add</mat-icon> Nueva Referencia
    </button>

    <div filter-menu class="filter-controls-vertical">
      <div class="filter-group">
        <label>Planta Relacionada</label>
        <select [ngModel]="selectedPlant" (ngModelChange)="onFilterChange('linkedPlant', $event); selectedPlant = ''">
          <option value="">Seleccionar planta...</option>
          <option *ngFor="let p of getPlants()" [value]="p">{{ p }}</option>
        </select>
        <div class="active-filters" *ngIf="activeFilters['linkedPlant']?.length">
          <div class="filter-label">Filtros activos:</div>
          <div class="filter-chips">
            <span *ngFor="let p of activeFilters['linkedPlant']" class="filter-chip">
              {{ p }} <mat-icon (click)="removeFilter('linkedPlant', p)">close</mat-icon>
            </span>
          </div>
        </div>
      </div>
    </div>
  </app-data-table>

  <app-drug-reference-modal [item]="selectedItem" [hasPrevious]="hasPrevious" [hasNext]="hasNext"
    (prev)="onPrevItem()" (next)="onNextItem()" (saved)="onSaveItem($event)">
  </app-drug-reference-modal>

  <app-confirmation-modal title="Eliminar Referencia"
    message="¿Estás seguro de que deseas eliminar esta referencia farmacológica?"
    confirmText="Eliminar" confirmColor="#E53E3E" (confirmed)="onConfirmDelete()">
  </app-confirmation-modal>

  <ng-template #scoreTpl let-item>
    <div class="score-cell">
      <div class="score-bar">
        <div class="score-fill" [style.width.%]="item.similarityScore * 100" [style.background]="getScoreColor(item.similarityScore)"></div>
      </div>
      <span class="score-value">{{ (item.similarityScore * 100).toFixed(0) }}%</span>
    </div>
  </ng-template>
</div>
