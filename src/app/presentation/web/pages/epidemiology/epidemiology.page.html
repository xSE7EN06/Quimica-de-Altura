<div class="epidemiology-page">
  <header class="page-header">
    <div class="page-title">
      <h1>Epidemiología de Consultas</h1>
      <p>Síntomas más frecuentes y tendencias de búsqueda por región y temporada</p>
    </div>
  </header>

  <div class="stats-grid">
    <div class="stat-card" *ngFor="let card of statCards">
      <div class="stat-icon"><mat-icon>{{ card.icon }}</mat-icon></div>
      <div class="stat-info">
        <span class="stat-value">{{ card.value }}</span>
        <span class="stat-label">{{ card.label }}</span>
      </div>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <h3>Top 10 Síntomas Consultados</h3>
      <div class="chart-container">
        <canvas baseChart [data]="symptomsChartData" [options]="symptomsChartOptions" type="bar"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h3>Tendencia Mensual de Consultas 2024</h3>
      <div class="chart-container">
        <canvas baseChart [data]="trendChartData" [options]="trendChartOptions" type="line"></canvas>
      </div>
    </div>
  </div>
</div>
