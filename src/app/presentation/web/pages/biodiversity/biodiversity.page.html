<div class="biodiversity-page">
  <header class="page-header">
    <div class="page-title">
      <h1>Biodiversidad</h1>
      <p>Cobertura y completitud de datos por especie y región</p>
    </div>
  </header>

  <div class="stats-grid">
    <div class="stat-card" *ngFor="let card of statCards">
      <div class="stat-icon"><mat-icon>{{ card.icon }}</mat-icon></div>
      <div class="stat-info">
        <span class="stat-value">{{ card.value }}</span>
        <span class="stat-label">{{ card.label }}</span>
      </div>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <h3>Cobertura por Estado</h3>
      <div class="chart-container">
        <canvas baseChart [data]="coverageChartData" [options]="coverageChartOptions" type="bar"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h3>Completitud de Datos</h3>
      <div class="chart-container">
        <canvas baseChart [data]="completenessChartData" [options]="completenessChartOptions" type="doughnut"></canvas>
      </div>
    </div>
  </div>
</div>
