<div class="drug-analogs-page">
  <header class="page-header">
    <div class="page-title">
      <h1>Análogos Farmacológicos</h1>
      <p>Similitud estructural entre compuestos naturales y fármacos de referencia</p>
    </div>
  </header>

  <div class="stats-grid">
    <div class="stat-card" *ngFor="let card of statCards">
      <div class="stat-icon"><mat-icon>{{ card.icon }}</mat-icon></div>
      <div class="stat-info">
        <span class="stat-value">{{ card.value }}</span>
        <span class="stat-label">{{ card.label }}</span>
      </div>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <h3>Puntajes de Similitud por Compuesto</h3>
      <div class="chart-container">
        <canvas baseChart [data]="similarityChartData" [options]="similarityChartOptions" type="bar"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h3>Superposición de Vías Metabólicas</h3>
      <div class="chart-container">
        <canvas baseChart [data]="pathwaysChartData" [options]="pathwaysChartOptions" type="doughnut"></canvas>
      </div>
    </div>
  </div>
</div>
