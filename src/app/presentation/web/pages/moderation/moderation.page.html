<div class="moderation-page">
  <header class="page-header">
    <div class="page-title">
      <h1>Moderación</h1>
      <p>Gestiona correcciones y envíos de la comunidad científica</p>
    </div>
  </header>

  <app-data-table [data]="items" [columns]="columns" [loading]="tableLoading"
    (rowClick)="onViewItem($event)" (editAction)="onEditItem($event)"
    (deleteAction)="onBulkDelete($event)" (resetFilters)="onResetFilters()">

    <div search-bar class="search-bar">
      <mat-icon class="search-icon">search</mat-icon>
      <input type="text" [(ngModel)]="searchTerm" placeholder="Buscar por contenido o usuario..." />
      <mat-icon class="clear-icon" *ngIf="searchTerm" (click)="searchTerm = ''">close</mat-icon>
    </div>

    <button add-button class="btn-primary" (click)="onAddItem()">
      <mat-icon>add</mat-icon> Nuevo Elemento
    </button>

    <div filter-menu class="filter-controls-vertical">
      <div class="filter-group">
        <label>Estado</label>
        <select [ngModel]="selectedStatus" (ngModelChange)="onFilterChange('status', $event); selectedStatus = ''">
          <option value="">Todos</option>
          <option value="pending">Pendiente</option>
          <option value="approved">Aprobado</option>
          <option value="rejected">Rechazado</option>
        </select>
        <div class="active-filters" *ngIf="activeFilters['status']?.length">
          <div class="filter-chips">
            <span *ngFor="let s of activeFilters['status']" class="filter-chip">
              {{ getStatusLabel(s) }} <mat-icon (click)="removeFilter('status', s)">close</mat-icon>
            </span>
          </div>
        </div>
      </div>
      <div class="filter-group">
        <label>Tipo</label>
        <select [ngModel]="selectedType" (ngModelChange)="onFilterChange('type', $event); selectedType = ''">
          <option value="">Todos</option>
          <option value="record">Registro</option>
          <option value="correction">Corrección</option>
          <option value="submission">Envío</option>
        </select>
        <div class="active-filters" *ngIf="activeFilters['type']?.length">
          <div class="filter-chips">
            <span *ngFor="let t of activeFilters['type']" class="filter-chip">
              {{ getTypeLabel(t) }} <mat-icon (click)="removeFilter('type', t)">close</mat-icon>
            </span>
          </div>
        </div>
      </div>
    </div>
  </app-data-table>

  <app-moderation-modal [item]="selectedItem" [hasPrevious]="hasPrevious" [hasNext]="hasNext"
    (prev)="onPrevItem()" (next)="onNextItem()" (saved)="onSaveItem($event)">
  </app-moderation-modal>

  <app-confirmation-modal title="Eliminar Elemento"
    message="¿Estás seguro de que deseas eliminar este elemento de moderación?"
    confirmText="Eliminar" confirmColor="#E53E3E" (confirmed)="onConfirmDelete()">
  </app-confirmation-modal>

  <ng-template #typeTpl let-item>
    <span class="type-badge" [ngClass]="item.type">{{ getTypeLabel(item.type) }}</span>
  </ng-template>

  <ng-template #contentTpl let-item>
    <span class="content-preview">{{ truncate(item.content) }}</span>
  </ng-template>

  <ng-template #statusTpl let-item>
    <span class="status-badge" [ngClass]="item.status">{{ getStatusLabel(item.status) }}</span>
  </ng-template>
</div>
