<div class="phytochemical-page">
  <header class="page-header">
    <div class="page-title">
      <h1>Análisis Fitoquímico</h1>
      <p>Distribución de compuestos y actividad farmacológica registrada</p>
    </div>
  </header>

  <div class="stats-grid">
    <div class="stat-card" *ngFor="let card of statCards">
      <div class="stat-icon"><mat-icon>{{ card.icon }}</mat-icon></div>
      <div class="stat-info">
        <span class="stat-value">{{ card.value }}</span>
        <span class="stat-label">{{ card.label }}</span>
      </div>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <h3>Clases de Compuestos</h3>
      <div class="chart-container">
        <canvas baseChart [data]="classesChartData" [options]="classesChartOptions" type="doughnut"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h3>Actividad Farmacológica</h3>
      <div class="chart-container">
        <canvas baseChart [data]="activityChartData" [options]="activityChartOptions" type="bar"></canvas>
      </div>
    </div>
  </div>
</div>
