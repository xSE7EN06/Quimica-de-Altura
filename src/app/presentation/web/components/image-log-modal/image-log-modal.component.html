<ion-modal [isOpen]="isOpen" (didDismiss)="onDidDismiss()" class="image-log-modal">
  <ng-template>
    <div class="modal-container">
      <button class="nav-arrow prev" *ngIf="hasPrevious && mode !== 'add'" (click)="prev.emit()"><mat-icon>chevron_left</mat-icon></button>
      <button class="nav-arrow next" *ngIf="hasNext && mode !== 'add'" (click)="next.emit()"><mat-icon>chevron_right</mat-icon></button>

      <div class="modal-wrapper" [class.is-viewing]="mode === 'view'">
        <div class="modal-header-banner">
          <div class="header-overlay">
            <button class="close-btn" (click)="close()"><mat-icon>close</mat-icon></button>
            <div class="header-content">
              <span class="category-badge">Log de Imagen</span>
              <h1>{{ item?.predictedSpecies || 'Nueva Entrada' }}</h1>
              <p class="header-sub">Confianza: {{ getConfidencePct() }}</p>
            </div>
          </div>
        </div>

        <div class="modal-scroll-content">
          <div class="image-preview" *ngIf="item?.imageUrl">
            <img [src]="item?.imageUrl" [alt]="item?.predictedSpecies" (error)="$any($event.target).src='https://via.placeholder.com/400x200?text=Imagen+no+disponible'">
          </div>

          <form [formGroup]="form">
            <div class="form-section">
              <h3>Resultado de Identificación</h3>
              <div class="form-grid">
                <div class="form-field">
                  <label>Especie Predicha</label>
                  <input type="text" formControlName="predictedSpecies" [readOnly]="true">
                </div>
                <div class="form-field">
                  <label>Confianza</label>
                  <input type="text" [value]="getConfidencePct()" readOnly>
                </div>
                <div class="form-field">
                  <label>Versión del Modelo</label>
                  <input type="text" formControlName="modelVersion" [readOnly]="true">
                </div>
                <div class="form-field">
                  <label>Usuario</label>
                  <input type="text" formControlName="userId" [readOnly]="true">
                </div>
              </div>
            </div>

            <div class="form-section">
              <h3>Retroalimentación</h3>
              <div class="form-grid">
                <div class="form-field">
                  <label>Feedback del Usuario</label>
                  <select formControlName="userFeedback" [attr.disabled]="isReadOnly ? true : null">
                    <option value="correct">Correcto</option>
                    <option value="incorrect">Incorrecto</option>
                    <option value="unsure">Inseguro</option>
                  </select>
                </div>
                <div class="form-field">
                  <label>Marcado para Revisión</label>
                  <div class="checkbox-field">
                    <input type="checkbox" formControlName="flagged" [attr.disabled]="isReadOnly ? true : null" id="flaggedCheck">
                    <label for="flaggedCheck">Sí, marcar este log</label>
                  </div>
                </div>
              </div>
            </div>
          </form>
        </div>

        <div class="modal-footer">
          <div class="footer-actions">
            <button *ngIf="isReadOnly" class="btn-edit" (click)="toggleEdit()"><mat-icon>edit</mat-icon> Editar</button>
            <button *ngIf="!isReadOnly" class="btn-cancel" (click)="close()">Cancelar</button>
            <button *ngIf="!isReadOnly" class="btn-save" (click)="onSave()"><mat-icon>save</mat-icon> Guardar</button>
          </div>
        </div>
      </div>
    </div>
  </ng-template>
</ion-modal>

<app-confirmation-modal [isOpen]="showConfirmModal" title="Confirmar Cambios"
  message="¿Guardar los cambios en este log?" confirmColor="var(--accent-color)"
  confirmText="Guardar" (confirmed)="executeSave()" (cancelled)="showConfirmModal = false">
</app-confirmation-modal>
